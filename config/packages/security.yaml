security:
    password_hashers:
        App\Domain\User\User: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Domain\User\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            stateless: true
            provider: app_user_provider
            custom_authenticators:
                - App\Infrastructure\Security\BearerTokenAuthenticator

    access_control:
        - { path: ^/api/health$, roles: PUBLIC_ACCESS }
        - { path: ^/api/register/patient$, roles: PUBLIC_ACCESS }
        - { path: ^/api/register/doctor$, roles: PUBLIC_ACCESS }
        - { path: ^/api/login$, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            App\Domain\User\User:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
