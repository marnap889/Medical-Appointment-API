openapi: 3.1.0
info:
  title: Medical Appointment API
  version: 1.0.0
  description: >
    Minimal API skeleton exposing only the healthcheck endpoint.
servers:
  - url: http://localhost:8080
paths:
  /api/health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                    example: true
