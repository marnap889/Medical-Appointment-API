name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ai-workflow-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Python Runtime
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Node Runtime
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install AI Workflow Dependencies
        run: |
          python -m venv ai-orchestration/.venv
          source ai-orchestration/.venv/bin/activate
          pip install -r ai-orchestration/requirements.txt

      - name: Validate Shell Scripts
        run: bash -n ai-orchestration/scripts/ai_*.sh

      - name: Validate Python Orchestration Modules
        run: python -m py_compile ai-orchestration/ai_*.py

      - name: Validate MCP Elicitation Approval Contract
        run: |
          source ai-orchestration/.venv/bin/activate
          python ai-orchestration/scripts/ai_validate_elicitation_contract.py

      - name: Validate Make Command Wiring
        run: make -n ai-bootstrap ai-workflow ROLE=synthesis TASK="validation" ai-parallel ai-evidence

  build-test-image:
    runs-on: ubuntu-latest
    needs: ai-workflow-validation

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Prepare Environment File
        run: cp .env.dist .env

      - name: Build Test Image
        run: docker build --target php-ci -f docker/php/Dockerfile -t medical-appointment-api/php:ci .

      - name: Export Test Image
        run: docker save medical-appointment-api/php:ci -o /tmp/php-test-image.tar

      - name: Upload Test Image Artifact
        uses: actions/upload-artifact@v7
        with:
          name: php-test-image
          path: /tmp/php-test-image.tar
          retention-days: 1

  qa-matrix:
    runs-on: ubuntu-latest
    needs: build-test-image
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - check: unit
            command: make COMPOSE="docker compose -f compose.yaml -f compose.ci.yaml" test-unit
          - check: behat
            command: make COMPOSE="docker compose -f compose.yaml -f compose.ci.yaml" test-behat
          - check: cs
            command: make COMPOSE="docker compose -f compose.yaml -f compose.ci.yaml" cs
          - check: phpstan
            command: make COMPOSE="docker compose -f compose.yaml -f compose.ci.yaml" phpstan

    name: QA (${{ matrix.check }})

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Download Test Image Artifact
        uses: actions/download-artifact@v8
        with:
          name: php-test-image
          path: /tmp

      - name: Load Test Image
        run: docker load -i /tmp/php-test-image.tar

      - name: Prepare Environment File
        run: cp .env.dist .env

      - name: Start Test Stack
        run: docker compose -f compose.yaml -f compose.ci.yaml up -d --wait --no-build php postgres postgres_test

      - name: Ensure Composer Vendor Tree
        run: |
          docker compose -f compose.yaml -f compose.ci.yaml exec php sh -lc \
            'if [ ! -f /app/vendor/autoload.php ]; then mkdir -p /app/vendor && cp -a /opt/vendor/. /app/vendor/; fi'

      - name: Verify Prebuilt Composer Dependencies
        run: |
          docker compose -f compose.yaml -f compose.ci.yaml exec php test -f /app/vendor/autoload.php
          docker compose -f compose.yaml -f compose.ci.yaml exec php test -x /app/vendor/bin/phpunit
          docker compose -f compose.yaml -f compose.ci.yaml exec php test -x /app/vendor/bin/behat
          docker compose -f compose.yaml -f compose.ci.yaml exec php test -x /app/vendor/bin/phpstan
          docker compose -f compose.yaml -f compose.ci.yaml exec php test -x /app/vendor/bin/php-cs-fixer

      - name: Run ${{ matrix.check }}
        run: ${{ matrix.command }}

      - name: Stop Test Stack
        if: always()
        run: docker compose -f compose.yaml -f compose.ci.yaml down -v --remove-orphans
